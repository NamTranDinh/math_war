name: math_war
description: "Math War is a playful TRUE/FALSE math game for kids with pastel UI, mascot animations, progressive difficulty, and configurable learning speed."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  vibration: ^1.8.4
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/illustrations/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#FFF8E8"
    theme_color: "#6B7CFF"
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFF8E8"
  adaptive_icon_foreground: "assets/app_icon.png"
  remove_alpha_ios: true
